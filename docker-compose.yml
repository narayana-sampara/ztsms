services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_lms}
      POSTGRES_USER: ${POSTGRES_USER:-ztsms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Zefinity Student LMS API}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ztsms}:${POSTGRES_PASSWORD:-change-this-postgres-password}@db:5432/${POSTGRES_DB:-student_lms}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-long-random-secret}
      JWT_ISSUER: ${JWT_ISSUER:-ZefinityLms}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ZefinityLms.Web}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      WAIT_FOR_DATABASE: ${WAIT_FOR_DATABASE:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
